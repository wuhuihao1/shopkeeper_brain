<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>问器知识库</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:rgba(30, 41, 59, 0.7);
      --text:#e2e8f0;
      --muted:#94a3b8;
      --brand:#38bdf8;
      --brand2:#818cf8;
      --bubble-user:linear-gradient(135deg, #38bdf8, #818cf8);
      --bubble-bot:rgba(15, 23, 42, 0.6);
      --border:rgba(255, 255, 255, 0.1);
      --shadow:0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, -apple-system, Arial, sans-serif;
      background-color: #0f172a;
      background-image: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.08) 0%, transparent 50%),
                        linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      color:var(--text);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
    }
    .app{
      width:100%;
      max-width:1200px;
      height:min(820px, 92vh);
      background:var(--panel);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:row;
    }

    /* ===== 侧边栏 ===== */
    .sidebar{
      width:260px;
      flex-shrink:0;
      background:rgba(15, 23, 42, 0.8);
      border-right:1px solid var(--border);
      display:flex;
      flex-direction:column;
      transition: width 0.3s ease, min-width 0.3s ease;
      overflow:hidden;
    }
    .sidebar.collapsed{
      width:0;
      min-width:0;
      border-right:none;
    }
    .sidebar-header{
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      white-space:nowrap;
    }
    .sidebar-header span{
      font-size:14px;
      font-weight:600;
      color:var(--text);
    }
    .session-list{
      flex:1;
      overflow-y:auto;
      padding:8px;
    }
    .session-item{
      display:flex;
      align-items:center;
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      font-size:13px;
      color:var(--muted);
      transition: background 0.2s;
      position:relative;
      margin-bottom:2px;
      white-space:nowrap;
      overflow:hidden;
    }
    .session-item:hover{
      background:rgba(255, 255, 255, 0.05);
    }
    .session-item.active{
      background:rgba(56, 189, 248, 0.15);
      color:var(--text);
      border-left:3px solid var(--brand);
      padding-left:9px;
    }
    .session-item .session-title{
      flex:1;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .session-item .delete-btn{
      display:none;
      border:none;
      background:transparent;
      color:#f87171;
      font-size:16px;
      cursor:pointer;
      padding:0 4px;
      line-height:1;
      flex-shrink:0;
    }
    .session-item:hover .delete-btn{
      display:block;
    }
    .sidebar-footer{
      padding:12px;
      border-top:1px solid var(--border);
    }
    .new-session-btn{
      width:100%;
      border:none;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      color:#fff;
      padding:10px;
      border-radius:10px;
      font-size:13px;
      cursor:pointer;
      font-weight:500;
      white-space:nowrap;
    }
    .new-session-btn:hover{
      opacity:0.9;
    }

    /* ===== 主区域 ===== */
    .main{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
    }
    .topbar{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 18px;
      border-bottom:1px solid var(--border);
      background:rgba(15, 23, 42, 0.5);
    }
    .toggle-sidebar-btn{
      border:1px solid var(--border);
      background:rgba(15, 23, 42, 0.6);
      color:var(--muted);
      width:34px;
      height:34px;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }
    .toggle-sidebar-btn:hover{
      background:rgba(255,255,255,0.1);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:200px;
    }
    .logo{
      width:36px;height:36px;border-radius:10px;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow:0 0 20px rgba(56, 189, 248, 0.4);
    }
    .title{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }
    .title strong{font-size:14px}
    .title span{font-size:12px;color:var(--muted);margin-top:3px}
    .top-actions{
      margin-left:auto;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .pill{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      background:rgba(15, 23, 42, 0.6);
    }
    .btn{
      border:none;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      color:#fff;
      padding:8px 12px;
      border-radius:10px;
      font-size:12px;
      cursor:pointer;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}

    .chat{
      flex:1;
      overflow:auto;
      padding:16px 14px 10px;
      background:rgba(15, 23, 42, 0.3);
    }
    .dayline{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      margin:6px 0 14px;
    }
    .msg{
      display:flex;
      gap:10px;
      margin:10px 0;
      align-items:flex-end;
    }
    .msg.user{justify-content:flex-end}
    .msg > div:not(.avatar){
      flex:1;
      min-width:0;
    }
    .msg.user > div:not(.avatar){
      display:flex;
      flex-direction:column;
      align-items:flex-end;
    }
    .avatar{
      width:34px;height:34px;border-radius:10px;
      background:rgba(56, 189, 248, 0.15);
      display:flex;align-items:center;justify-content:center;
      font-size:14px;
      color:#94a3b8;
      flex:0 0 auto;
    }
    .avatar.bot{background:linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(129, 140, 248, 0.2))}
    .bubble{
      max-width:min(720px, 76%);
      display:inline-block;
      border-radius:14px;
      padding:10px 12px;
      border:1px solid var(--border);
      background:var(--bubble-bot);
      position:relative;
      line-height:1.55;
      font-size:14px;
      white-space:pre-wrap;
      overflow-wrap: break-word;
      color:#e2e8f0;
    }
    .msg.user .bubble{
      background:var(--bubble-user);
      color:#fff;
      border-color:transparent;
    }
    .meta{
      font-size:11px;
      color:var(--muted);
      margin-top:6px;
    }
    .msg.user .meta{color:rgba(255,255,255,.85)}
    details.progress{
      margin-top:8px;
      border:1px dashed rgba(56, 189, 248, 0.3);
      border-radius:12px;
      padding:8px 10px;
      background:rgba(15, 23, 42, 0.4);
    }
    details.progress summary{
      cursor:pointer;
      user-select:none;
      color:var(--muted);
      font-size:12px;
    }
    .progress ul{margin:8px 0 0 18px;padding:0}
    .progress li{margin:4px 0;font-size:12px;color:#94a3b8}

    .answer-images{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .answer-images img{
      display: block;
      max-width: min(100%, 600px);
      max-height: 600px;
      width: auto;
      height: auto;
      border-radius:12px;
      border:1px solid var(--border);
      box-shadow:0 10px 24px rgba(0, 0, 0, 0.3);
      background:rgba(15, 23, 42, 0.6);
    }
    .answer-images a{
      font-size:12px;
      color:var(--muted);
      text-decoration:none;
      word-break:break-all;
    }

    .typing{
      display:inline-flex;gap:6px;align-items:center;
    }
    .dot{
      width:7px;height:7px;border-radius:50%;
      background:#38bdf8;
      animation:bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2){animation-delay:.15s}
    .dot:nth-child(3){animation-delay:.3s}
    @keyframes bounce{
      0%,80%,100%{transform:translateY(0);opacity:.6}
      40%{transform:translateY(-5px);opacity:1}
    }

    .composer{
      border-top:1px solid var(--border);
      padding:12px 14px;
      display:flex;
      gap:10px;
      align-items:flex-end;
      background:rgba(15, 23, 42, 0.5);
    }
    textarea{
      flex:1;
      resize:none;
      min-height:44px;
      max-height:140px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      outline:none;
      font-size:14px;
      line-height:1.5;
      background:rgba(15, 23, 42, 0.6);
      color:#e2e8f0;
    }
    textarea:focus{border-color:rgba(56, 189, 248, 0.6); box-shadow:0 0 0 3px rgba(56, 189, 248, 0.15)}
    textarea::placeholder{color:#64748b}
    .send{
      width:88px;
      height:44px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      color:#fff;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow:0 0 15px rgba(56, 189, 248, 0.3);
    }
    .send:disabled{opacity:.6;cursor:not-allowed}
    .hint{
      padding:0 14px 12px;
      color:var(--muted);
      font-size:12px;
      background:transparent;
    }
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      border:1px solid var(--border);
      padding:1px 6px;
      border-radius:6px;
      background:rgba(15, 23, 42, 0.6);
      color:#94a3b8;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>会话列表</span>
      </div>
      <div class="session-list" id="sessionList"></div>
      <div class="sidebar-footer">
        <button class="new-session-btn" id="btnNewSession">+ 新建会话</button>
      </div>
    </div>

    <!-- 主区域 -->
    <div class="main">
      <div class="topbar">
        <button class="toggle-sidebar-btn" id="btnToggleSidebar" title="切换侧边栏">&#9776;</button>
        <div class="brand">
          <div class="logo"></div>
          <div class="title">
            <strong>问器知识库</strong>
            <span id="subTitle">在线 · 可查询知识库与联网信息</span>
          </div>
        </div>
        <div class="top-actions">
          <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;color:var(--muted);margin-right:10px;">
            <input type="checkbox" id="streamToggle" checked> 流式输出
          </label>
          <button class="btn" id="btnClear">清空对话</button>
        </div>
      </div>

      <div class="chat" id="chat">
        <div class="dayline">今天</div>
        <div class="msg bot">
          <div class="avatar bot">问器</div>
          <div>
            <div class="bubble">你好，我是问器知识库客服。你可以直接提问，我会在"阶段进度"里展示处理过程。</div>
            <div class="meta">提示：可以问"如何使用万用表测量电压？"</div>
          </div>
        </div>
      </div>

      <div class="composer">
        <textarea id="input" placeholder="请输入问题（Enter 发送，Shift+Enter 换行）"></textarea>
        <button class="send" id="send">发送</button>
      </div>
      <div class="hint">快捷键：<span class="kbd">Enter</span> 发送，<span class="kbd">Shift</span>+<span class="kbd">Enter</span> 换行</div>
    </div>
  </div>

  <script>
    const API_BASE = `${location.protocol}//${location.host}`.includes('http') ? `${location.protocol}//${location.host}` : 'http://127.0.0.1:8001';
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const btnClear = document.getElementById('btnClear');
    const streamToggle = document.getElementById('streamToggle');
    const sidebarEl = document.getElementById('sidebar');
    const sessionListEl = document.getElementById('sessionList');
    const btnNewSession = document.getElementById('btnNewSession');
    const btnToggleSidebar = document.getElementById('btnToggleSidebar');

    // ===== 会话管理 =====
    const STORAGE_SESSIONS_KEY = 'kb_sessions';
    const STORAGE_ACTIVE_KEY = 'kb_active_session_id';

    let sessions = [];
    let activeSessionId = null;
    let currentEventSource = null; // 追踪当前SSE连接

    function loadSessionsFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_SESSIONS_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (_) { return []; }
    }

    function saveSessionsToStorage() {
      localStorage.setItem(STORAGE_SESSIONS_KEY, JSON.stringify(sessions));
    }

    function setActiveSession(id) {
      activeSessionId = id;
      localStorage.setItem(STORAGE_ACTIVE_KEY, id);
    }

    function generateSessionId() {
      return 'sess-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function createSession() {
      const id = generateSessionId();
      const session = { id, title: '新会话', createdAt: Date.now() };
      sessions.unshift(session);
      setActiveSession(id);
      saveSessionsToStorage();
      renderSidebar();
      resetChatArea();
      return session;
    }

    function findSession(id) {
      return sessions.find(s => s.id === id);
    }

    function updateSessionTitle(sessionId, title) {
      const session = findSession(sessionId);
      if (session) {
        session.title = title.slice(0, 20);
        saveSessionsToStorage();
        renderSidebar();
      }
    }

    function deleteSessionById(id) {
      sessions = sessions.filter(s => s.id !== id);
      saveSessionsToStorage();
      renderSidebar();
    }

    function switchToSession(id) {
      if (id === activeSessionId) return;
      // 关闭当前SSE连接
      closeCurrentEventSource();
      setActiveSession(id);
      renderSidebar();
      loadHistory();
    }

    // ===== 侧边栏渲染 =====
    function renderSidebar() {
      sessionListEl.innerHTML = '';
      for (const session of sessions) {
        const item = document.createElement('div');
        item.className = 'session-item' + (session.id === activeSessionId ? ' active' : '');
        item.innerHTML = `
          <span class="session-title">${escapeHtml(session.title)}</span>
          <button class="delete-btn" data-id="${session.id}" title="删除会话">&times;</button>
        `;
        // 点击切换会话
        item.addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-btn')) return;
          switchToSession(session.id);
        });
        // 删除按钮
        const deleteBtn = item.querySelector('.delete-btn');
        deleteBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm('确定要删除该会话吗？历史记录将无法恢复。')) return;
          try {
            await fetch(`${API_BASE}/session/${session.id}`, { method: 'DELETE' });
          } catch (_) {}
          deleteSessionById(session.id);
          // 若删除的是当前活跃会话，切换到第一个或新建
          if (session.id === activeSessionId) {
            if (sessions.length > 0) {
              switchToSession(sessions[0].id);
            } else {
              createSession();
            }
          }
        });
        sessionListEl.appendChild(item);
      }
    }

    // ===== 侧边栏折叠 =====
    btnToggleSidebar.addEventListener('click', () => {
      sidebarEl.classList.toggle('collapsed');
    });

    // ===== 聊天区重置 =====
    function resetChatArea() {
      chatEl.innerHTML = '';
      chatEl.insertAdjacentHTML('beforeend', '<div class="dayline">今天</div>');
      chatEl.insertAdjacentHTML('beforeend', `
        <div class="msg bot">
          <div class="avatar bot">问器</div>
          <div>
            <div class="bubble">你好，我是问器知识库客服。你可以直接提问，我会在"阶段进度"里展示处理过程。</div>
            <div class="meta">提示：可以问"如何使用万用表测量电压？"</div>
          </div>
        </div>
      `);
      scrollToBottom();
    }

    // ===== SSE 连接管理 =====
    function closeCurrentEventSource() {
      if (currentEventSource) {
        currentEventSource.close();
        currentEventSource = null;
      }
    }

    // ===== 初始化 =====
    async function init() {
      sessions = loadSessionsFromStorage();
      activeSessionId = localStorage.getItem(STORAGE_ACTIVE_KEY);

      // 如果 localStorage 中没有会话列表，从后端恢复
      if (sessions.length === 0) {
        try {
          const res = await fetch(`${API_BASE}/sessions`);
          if (res.ok) {
            const data = await res.json();
            const backendSessions = Array.isArray(data.sessions) ? data.sessions : [];
            sessions = backendSessions.map(s => ({
              id: s.session_id,
              title: (s.last_text || '新会话').slice(0, 20),
              createdAt: s.last_ts ? s.last_ts * 1000 : Date.now(),
            }));
            saveSessionsToStorage();
          }
        } catch (_) {}
      }

      // 确保有活跃会话
      if (!activeSessionId || !findSession(activeSessionId)) {
        if (sessions.length > 0) {
          activeSessionId = sessions[0].id;
        } else {
          createSession();
          return; // createSession 已调用 resetChatArea
        }
      }

      localStorage.setItem(STORAGE_ACTIVE_KEY, activeSessionId);
      renderSidebar();
      loadHistory();
    }

    // 新建会话按钮
    btnNewSession.addEventListener('click', () => {
      createSession();
    });

    // ===== 以下为原有聊天逻辑（适配多会话） =====
    function scrollToBottom(){
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    function nowTime(){
      const d = new Date();
      return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    }
    function formatTime(ts){
      if(!ts) return nowTime();
      const d = new Date(Number(ts) * 1000);
      if(Number.isNaN(d.getTime())) return nowTime();
      return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    }
    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function isImageUrl(url){
      try {
        const u = new URL(url);
        return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(u.pathname);
      } catch (e) {
        return /\.(png|jpe?g|gif|webp|bmp|svg)(\?|#|$)/i.test(url || '');
      }
    }

    function normalizeUrl(rawUrl){
      const s = String(rawUrl || '').trim();
      if(!s) return '';
      return s.replace(/\s/g, '%20');
    }

    function dedupeKeepOrder(arr){
      const seen = new Set();
      const out = [];
      for(const x of (Array.isArray(arr) ? arr : [])){
        const v = String(x || '');
        if(!v) continue;
        if(seen.has(v)) continue;
        seen.add(v);
        out.push(v);
      }
      return out;
    }

    function extractUrlsLoose(text){
      const s = String(text || '');
      const regex = /(https?:\/\/[^\s]+)/g;
      const matches = s.match(regex) || [];
      const urls = [];
      const trimTailPunct = (u) => String(u || '').replace(/[)\]}'">，。,;；\]】）＞]+$/g, '');
      const trimHeadPunct = (u) => String(u || '').replace(/^[<([{'"]+|^[＜（【\[]+/g, '');
      for(const m of matches){
        let u = trimHeadPunct(trimTailPunct(m));
        if(u) urls.push(u);
      }
      return dedupeKeepOrder(urls);
    }

    function parseImagesFromTextLoosely(text){
      const urls = extractUrlsLoose(text).filter(isImageUrl);
      return dedupeKeepOrder(urls);
    }

    function findLastImageMarkerIndex(raw){
      const s = String(raw || '');
      const re = /【\s*图片\s*】|\[\s*图片\s*\]/g;
      let m;
      let lastIdx = -1;
      let lastLen = 0;
      while((m = re.exec(s)) !== null){
        lastIdx = m.index;
        lastLen = m[0].length;
      }
      return { idx: lastIdx, len: lastLen };
    }

    function parseAnswerAndImages(text){
      const raw = String(text || '');
      const { idx, len } = findLastImageMarkerIndex(raw);
      if(idx === -1) return { text: raw, images: [] };
      const before = raw.slice(0, idx).trimEnd();
      const after = raw.slice(idx + len).trim();
      const urls = [];
      const lines = after.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      for(const line of lines){
        if(line.startsWith('http://') || line.startsWith('https://')){
          urls.push(line);
        }else{
          const matches = extractUrlsLoose(line);
          for(const u of matches) urls.push(u);
        }
      }
      const seen = new Set();
      const images = [];
      for(const u of urls){
        const normalized = normalizeUrl(u);
        if(!isImageUrl(normalized)) continue;
        if(seen.has(normalized)) continue;
        seen.add(normalized);
        images.push(normalized);
      }
      return { text: before, images };
    }

    function shouldShowImagesByAnswer(answerText){
      const t = String(answerText || '');
      const keywords = [
        '如图', '如下图', '见图', '见下图', '下图', '上图',
        '图片', '示意图', '结构图', '外观', '接线图', '电路图', '原理图', '安装图', '尺寸图', '截图'
      ];
      return keywords.some(k => t.includes(k));
    }

    function renderAnswerWithImages(containerEl, answerText, candidateImageUrls){
      const { text, images: imagesFromBlock } = parseAnswerAndImages(answerText);
      const candidates = Array.isArray(candidateImageUrls)
        ? candidateImageUrls.map(normalizeUrl).filter(isImageUrl)
        : [];
      const hasBlockImages = imagesFromBlock && imagesFromBlock.length > 0;
      const looseImages = extractUrlsLoose(answerText).map(normalizeUrl).filter(isImageUrl);
      const shouldShow = hasBlockImages || (candidates.length > 0) || (looseImages.length > 0);
      const allImages = new Set([
          ...(hasBlockImages ? imagesFromBlock : []),
          ...candidates,
          ...looseImages
      ]);
      const images = Array.from(allImages);

      containerEl.textContent = '';

      if((text || '').trim().length > 0){
        const textEl = document.createElement('div');
        textEl.className = 'answer-text';
        textEl.textContent = text;
        containerEl.appendChild(textEl);
      }else{
        const textEl = document.createElement('div');
        textEl.className = 'answer-text';
        textEl.textContent = '（已完成，但未返回答案）';
        containerEl.appendChild(textEl);
      }

      if(images && images.length > 0){
        const imgWrap = document.createElement('div');
        imgWrap.className = 'answer-images';
        for(const url of images){
          const safeUrl = normalizeUrl(url);
          const img = document.createElement('img');
          img.loading = 'lazy';
          img.src = safeUrl;
          img.alt = '参考图片';
          img.referrerPolicy = 'no-referrer';
          img.addEventListener('error', () => { img.style.display = 'none'; });
          imgWrap.appendChild(img);

          const link = document.createElement('a');
          link.href = safeUrl;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = url;
          imgWrap.appendChild(link);
        }
        containerEl.appendChild(imgWrap);
      }
    }

    function addUserMsg(text){
      const html = `
        <div class="msg user">
          <div>
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="meta">${nowTime()}</div>
          </div>
          <div class="avatar">我</div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
    }

    function addUserMsgWithTime(text, ts){
      const html = `
        <div class="msg user">
          <div>
            <div class="bubble">${escapeHtml(text)}</div>
            <div class="meta">${formatTime(ts)}</div>
          </div>
          <div class="avatar">我</div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
    }

    function addBotMsgWithTime(text, ts, imageUrls){
      const id = 'bot-his-' + Math.random().toString(36).slice(2);
      const html = `
        <div class="msg bot" id="${id}">
          <div class="avatar bot">问器</div>
          <div>
            <div class="bubble"><div class="answer"></div></div>
            <div class="meta">${formatTime(ts)}</div>
          </div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      const el = document.getElementById(id);
      if(el){
        const answerEl = el.querySelector('.answer');
        renderAnswerWithImages(answerEl, text || '', imageUrls || []);
      }
      scrollToBottom();
    }

    function addBotMsgSkeleton(){
      const id = 'bot-' + Math.random().toString(36).slice(2);
      const html = `
        <div class="msg bot" id="${id}">
          <div class="avatar bot">问器</div>
          <div style="min-width: 180px;">
            <div class="bubble">
              <span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
              <details class="progress" open>
                <summary>阶段进度（等待中）</summary>
                <ul></ul>
              </details>
            </div>
            <div class="meta">${nowTime()}</div>
          </div>
        </div>
      `;
      chatEl.insertAdjacentHTML('beforeend', html);
      scrollToBottom();
      return document.getElementById(id);
    }

    function renderProgress(botMsgEl, doneList, runningList, status){
      const details = botMsgEl.querySelector('details.progress');
      const summary = details.querySelector('summary');
      const ul = details.querySelector('ul');
      const done = Array.isArray(doneList) ? doneList : [];
      const running = Array.isArray(runningList) ? runningList : [];
      const totalDone = done.length;
      const totalRun = running.length;

      const statusMap = {
        'processing': '处理中',
        'completed': '已完成',
        'failed': '失败',
        'pending': '等待中',
      };
      const displayStatus = statusMap[status] || status || 'unknown';

      summary.textContent = `阶段进度（已完成${totalDone}，进行中${totalRun}，状态：${displayStatus}）`;

      const lines = [
        ...done.map(x => `✅ ${x}`),
        ...running.map(x => `⏳ ${x}`)
      ];
      ul.innerHTML = '';
      if(lines.length === 0){
        ul.insertAdjacentHTML('beforeend', '<li>暂无进度</li>');
      }else{
        for(const line of lines){
          ul.insertAdjacentHTML('beforeend', `<li>${escapeHtml(line)}</li>`);
        }
      }
    }

    function finalizeBotAnswer(botMsgEl, answer, error, imageUrls){
      const bubble = botMsgEl.querySelector('.bubble');
      const progress = botMsgEl.querySelector('details.progress');
      const err = (error || '').trim();

      if(err){
        const progressEl = progress ? progress : null;
        if(progressEl) {
            progressEl.remove();
            progressEl.removeAttribute('open');
        }
        bubble.textContent = '';
        const errEl = document.createElement('div');
        errEl.className = 'answer';
        errEl.textContent = `抱歉，本次处理失败：\n${err}`;
        bubble.appendChild(errEl);
        if(progressEl) bubble.appendChild(progressEl);
        return;
      }

      const progressEl = progress ? progress : null;
      if(progressEl) {
        progressEl.remove();
        progressEl.removeAttribute('open');
      }
      bubble.textContent = '';
      const answerEl = document.createElement('div');
      answerEl.className = 'answer';
      bubble.appendChild(answerEl);
      renderAnswerWithImages(answerEl, answer || '', imageUrls || []);
      if(progressEl) bubble.appendChild(progressEl);
    }

    async function loadHistory(){
      if (!activeSessionId) return;
      try{
        const res = await fetch(`${API_BASE}/history/${activeSessionId}`);
        if(!res.ok) return;
        const data = await res.json();
        const items = Array.isArray(data.items) ? data.items : [];
        // 保留首条欢迎消息，其余先清空再渲染历史
        const nodes = Array.from(chatEl.querySelectorAll('.msg'));
        for(let i=1;i<nodes.length;i++) nodes[i].remove();
        for(const item of items){
          if(item.role === 'user'){
            addUserMsgWithTime(item.text || '', item.ts);
          }else{
            addBotMsgWithTime(item.text || '', item.ts, item.image_urls || []);
          }
        }
        scrollToBottom();
      }catch(_){}
    }

    async function submitQuery(text){
      const isStream = streamToggle.checked;
      const res = await fetch(`${API_BASE}/query`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          query: text,
          session_id: activeSessionId,
          is_stream: isStream
        })
      });
      if(!res.ok){
        const msg = await res.text();
        throw new Error(msg || '请求失败');
      }
      return await res.json();
    }

    async function poll(taskId, botMsgEl){
      const typing = botMsgEl.querySelector('.typing');
      const interval = setInterval(async () => {
        try{
          const res = await fetch(`${API_BASE}/status/${taskId}`);
          const data = await res.json();
          renderProgress(botMsgEl, data.done_list, data.running_list, data.status);

          if(data.status === 'completed'){
            if(typing) typing.remove();
            finalizeBotAnswer(botMsgEl, data.answer, data.error, data.image_urls || []);
            clearInterval(interval);
            sendBtn.disabled = false;
          }else if(data.status === 'failed'){
            if(typing) typing.remove();
            finalizeBotAnswer(botMsgEl, data.answer, data.error || 'failed', data.image_urls || []);
            clearInterval(interval);
            sendBtn.disabled = false;
          }
        }catch(e){
          // 轮询错误不立刻终止，让用户稍后重试
        }
      }, 1200);
    }

    async function onSend(){
      console.log('[perf] A onSend start', performance.now());
      const text = (inputEl.value || '').trim();
      if(!text) return;
      inputEl.value = '';
      addUserMsg(text);

      // 自动更新会话标题（首次发送消息时）
      const session = findSession(activeSessionId);
      if (session && session.title === '新会话') {
        updateSessionTitle(activeSessionId, text);
      }

      const botMsgEl = addBotMsgSkeleton();
      sendBtn.disabled = true;

      try{
        const isStream = streamToggle.checked;
        console.log('[perf] B submitQuery start', performance.now(), { isStream });
        const data = await submitQuery(text);
        console.log('[perf] B submitQuery end', performance.now(), data);

        renderProgress(botMsgEl, [], [], 'pending');

        if (!isStream) {
          renderProgress(botMsgEl, data.done_list || [], [], 'completed');
          finalizeBotAnswer(botMsgEl, data.answer, data.error, data.image_urls || []);
          sendBtn.disabled = false;
          return;
        }

        const { task_id } = data;

        const bubble = botMsgEl.querySelector('.bubble');
        let answerEl = bubble.querySelector('.answer');
        if(!answerEl){
          answerEl = document.createElement('div');
          answerEl.className = 'answer';
          bubble.insertBefore(answerEl, bubble.firstChild);
        }

        // 关闭之前的SSE连接
        closeCurrentEventSource();

        const es = new EventSource(`${API_BASE}/stream/${task_id}`);
        currentEventSource = es;
        console.log('[perf] C EventSource created', performance.now(), { task_id });
        let rawAnswerText = '';

        es.addEventListener('progress', (e) => {
          try{
            const d = JSON.parse(e.data || '{}');
            renderProgress(botMsgEl, d.done_list, d.running_list, d.status);
            if(d && d.status === 'completed'){
              const typing = botMsgEl.querySelector('.typing');
              if(typing) typing.remove();
              sendBtn.disabled = false;
            }
          }catch(_){}
        });

        es.addEventListener('delta', (e) => {
          try{
            const d = JSON.parse(e.data || '{}');
            const delta = d.delta || '';
            if(delta){
              rawAnswerText += delta;
              renderAnswerWithImages(answerEl, rawAnswerText, []);
              scrollToBottom();
            }
          }catch(_){}
        });

        function handleFinalEvent(e) {
          const typing = botMsgEl.querySelector('.typing');
          if(typing) typing.remove();

          const details = botMsgEl.querySelector('details.progress');
          if(details){
            const ul = details.querySelector('ul');
            if(ul){
              const lis = ul.querySelectorAll('li');
              lis.forEach(li => {
                if(li.textContent.includes('⏳')){
                  li.textContent = li.textContent.replace('⏳', '✅');
                }
              });
            }
            const summary = details.querySelector('summary');
            if(summary){
              const totalDone = details.querySelectorAll('li').length;
              summary.textContent = `阶段进度（已完成${totalDone}，进行中0，状态：已完成）`;
            }
            details.removeAttribute('open');
          }

          try{
            const d = JSON.parse(e.data || '{}');
            const finalText = (d && typeof d.answer === 'string' && d.answer.trim().length > 0) ? d.answer : (rawAnswerText || answerEl.textContent || '');
            renderAnswerWithImages(answerEl, finalText, d.image_urls || []);
          }catch(_){}
          es.close();
          currentEventSource = null;
          sendBtn.disabled = false;
        }

        es.addEventListener('final', handleFinalEvent);
        es.addEventListener('final_answer', handleFinalEvent);

        es.addEventListener('error', (e) => {
          const typing = botMsgEl.querySelector('.typing');
          if(typing) typing.remove();
          const progress = botMsgEl.querySelector('details.progress');
          if(progress) progress.removeAttribute('open');

          try{
            const msg = e && e.data ? (JSON.parse(e.data).error || 'SSE 连接中断/失败') : 'SSE 连接中断/失败';
            rawAnswerText += `\n\n（错误：${msg}）`;
            renderAnswerWithImages(answerEl, rawAnswerText, []);
          }catch(_){
            rawAnswerText += `\n\n（错误：SSE 连接中断/失败）`;
            renderAnswerWithImages(answerEl, rawAnswerText, []);
          }
          es.close();
          currentEventSource = null;
          sendBtn.disabled = false;
        });
      }catch(e){
        const bubble = botMsgEl.querySelector('.bubble');
        const progress = botMsgEl.querySelector('details.progress');
        const typing = botMsgEl.querySelector('.typing');
        if(typing) typing.remove();
        bubble.innerHTML = `请求失败：${escapeHtml(e.message || e)}\n\n` + progress.outerHTML;
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', onSend);
    inputEl.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        onSend();
      }
    });
    btnClear.addEventListener('click', async () => {
      if(!confirm('确定要清空当前会话的历史记录吗？这将无法恢复。')) return;

      try {
        const res = await fetch(`${API_BASE}/history/${activeSessionId}`, { method: 'DELETE' });
        if(!res.ok) {
           console.error("Failed to clear history backend, status:", res.status);
           alert('服务端清空失败，仅清空本地显示');
        }
      } catch(e) {
        console.error("Failed to clear history backend", e);
        alert('服务端清空失败，仅清空本地显示');
      }

      const nodes = Array.from(chatEl.querySelectorAll('.msg'));
      for(let i=1;i<nodes.length;i++) nodes[i].remove();
      scrollToBottom();
    });

    // 启动
    init();
    setTimeout(() => inputEl.focus(), 200);
  </script>
</body>
</html>
