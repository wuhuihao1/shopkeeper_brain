<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>文渊阁 · 书卷导入</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========= 做旧泛黄 · 传统阅读器风格（与听书知识库统一） ========= */
        :root {
            --paper-base: #fbf7e9;           /* 旧书页米黄基底 */
            --paper-dark: #e8e0ce;           /* 加深边缘做旧 */
            --ink-dark: #3c2f2a;             /* 深褐墨色 */
            --ink-soft: #5e4b3c;             /* 柔和褐色 */
            --sepia-light: #f5efdf;          /* 浅怀旧色调 */
            --shadow-paper: rgba(60, 45, 35, 0.12);
            --border-paper: #d8cdb0;
            --highlight-warm: #c9ad7a;
            --paper-texture: repeating-linear-gradient(
                45deg,
                rgba(200, 175, 140, 0.08) 0px,
                rgba(200, 175, 140, 0.08) 2px,
                transparent 2px,
                transparent 8px
            );
        }

        body {
            font-family: "思源宋体", "Noto Serif SC", "Times New Roman", "宋体", Georgia, "Cambria", serif;
            margin: 0;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #cbbd9c;  /* 老旧木板/麻布底色 */
            position: relative;
        }

        /* 做旧纸张背景 + 颗粒感 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 25% 40%, rgba(100, 70, 40, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 70% 85%, rgba(80, 55, 30, 0.06) 1px, transparent 1px);
            background-size: 32px 32px, 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 880px;
            background: var(--paper-base);
            background-image: var(--paper-texture),
                              linear-gradient(145deg, var(--paper-base) 0%, var(--sepia-light) 100%);
            padding: 32px 34px;
            border-radius: 8px 28px 28px 8px;
            border: 1px solid #d6c9ae;
            box-shadow: 0 20px 35px -15px var(--shadow-paper), inset 0 1px 0 rgba(255, 245, 215, 0.6);
            color: var(--ink-dark);
            position: relative;
            transition: all 0.2s;
        }

        /* 古籍书脊装饰 */
        .container::before {
            content: "";
            position: absolute;
            top: 12px;
            bottom: 12px;
            left: 0;
            width: 6px;
            background: linear-gradient(to right, rgba(100, 70, 40, 0.25), transparent);
            pointer-events: none;
        }

        h1 {
            color: #5b3a24;
            text-align: center;
            margin-bottom: 28px;
            font-weight: 600;
            letter-spacing: 3px;
            font-size: 26px;
            font-family: "思源宋体", "Noto Serif SC", serif;
            text-shadow: 1px 1px 0 #fef0df;
            border-bottom: 1px solid #decfa8;
            display: inline-block;
            width: auto;
            padding-bottom: 10px;
        }
        .title-wrapper {
            text-align: center;
            margin-bottom: 20px;
        }

        /* 上传区 —— 仿古籍宣纸 */
        .upload-area {
            border: 2px dashed #d6be92;
            background: rgba(245, 239, 219, 0.6);
            border-radius: 28px;
            padding: 42px 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 28px;
            position: relative;
            backdrop-filter: blur(2px);
        }

        .upload-area:hover {
            border-color: #b98f5a;
            background: #fef7e8;
            box-shadow: 0 8px 20px rgba(100, 70, 40, 0.1);
        }

        .upload-icon {
            font-size: 56px;
            margin-bottom: 12px;
            filter: drop-shadow(2px 2px 6px rgba(100, 70, 40, 0.2));
            color: #b98f5a;
        }

        .upload-text {
            color: #7c5d3c;
            font-size: 15px;
            letter-spacing: 1px;
            font-style: italic;
        }
        .upload-sub {
            font-size: 12px;
            color: #b68b54;
            margin-top: 10px;
        }

        .file-input {
            display: none;
        }

        /* 文件列表 —— 书卷样式 */
        .file-list {
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .file-item {
            background: #fef8ec;
            border: 1px solid #e2cfab;
            border-radius: 20px;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .file-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(80, 55, 30, 0.1);
            border-color: #cbbf92;
            background: #fffcf0;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-right: 18px;
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .file-name {
            font-weight: 600;
            color: #4f3622;
            font-size: 15px;
            font-family: "思源宋体", serif;
            letter-spacing: 0.3px;
        }

        .file-size {
            font-size: 12px;
            color: #b59160;
            font-family: monospace;
        }

        .status-badge {
            padding: 5px 14px;
            border-radius: 36px;
            font-size: 12px;
            font-weight: 500;
            color: #2c241a;
            min-width: 82px;
            text-align: center;
            letter-spacing: 0.8px;
            background: #e7d9bd;
            border: 1px solid #d2bd90;
            box-shadow: inset 0 1px 0 rgba(255, 250, 235, 0.7);
        }

        .status-uploading {
            background: #eedfb8;
            color: #8b6942;
            border-color: #dac294;
        }

        .status-processing {
            background: #e2d0ae;
            color: #6c4f2e;
            border-left: 3px solid #c9a163;
        }

        .status-completed {
            background: #dde2c6;
            color: #4f6b3c;
            border-color: #bbbf8a;
        }

        .status-error {
            background: #f3dfcf;
            color: #b15533;
            border-color: #daaa8a;
        }

        .progress-wrapper {
            margin-top: 12px;
            display: none;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #e4d5b6;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(80, 50, 25, 0.15);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 12px;
            transition: width 0.35s ease;
            background: linear-gradient(90deg, #b88f5a, #dcb27a);
            position: relative;
        }

        .progress-text {
            font-size: 11px;
            color: #a47e53;
            margin-top: 6px;
            text-align: right;
            font-family: monospace;
        }

        /* 日志详情 —— 仿古籍批注 */
        .log-details {
            margin-top: 16px;
            font-size: 13px;
            background: #fef5e6;
            border-radius: 20px;
            padding: 12px 16px;
            border: 1px solid #e1cfaa;
            box-shadow: inset 0 0 0 1px #fffcf2, 0 1px 2px rgba(0,0,0,0.02);
        }

        .log-details summary {
            cursor: pointer;
            user-select: none;
            color: #8b6942;
            outline: none;
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.5px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #e2cfab;
        }

        .log-details[open] summary {
            margin-bottom: 6px;
        }

        .log-details summary:hover {
            color: #c0884a;
        }

        .log-details summary::marker {
            color: #c7a86b;
        }

        .log-list {
            margin: 6px 0 0 0;
            padding: 0 0 0 24px;
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
            position: relative;
        }

        /* 时间线竖线（墨迹） */
        .log-list::before {
            content: "";
            position: absolute;
            left: 10px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: linear-gradient(180deg, #d6bd8c, #cfb176);
            border-radius: 2px;
        }

        .log-list::-webkit-scrollbar {
            width: 5px;
        }
        .log-list::-webkit-scrollbar-track {
            background: #ede0ca;
            border-radius: 4px;
        }
        .log-list::-webkit-scrollbar-thumb {
            background: #c3a36b;
            border-radius: 4px;
        }

        .log-list li {
            margin: 0;
            padding: 8px 12px;
            line-height: 1.45;
            display: flex;
            align-items: center;
            position: relative;
            border-radius: 12px;
            transition: background 0.1s;
            gap: 8px;
            flex-wrap: wrap;
        }

        .log-list li::before {
            content: "";
            position: absolute;
            left: -19px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #d6be92;
            background: #f2e5cf;
            box-shadow: 0 0 0 2px rgba(245, 235, 210, 0.9);
            z-index: 1;
        }

        .log-done {
            color: #5c6e46;
        }
        .log-done::before {
            background: #aac78d !important;
            border-color: #8baa62 !important;
            box-shadow: 0 0 0 2px #fef5e6 !important;
        }

        .log-duration {
            margin-left: auto;
            font-size: 11px;
            color: #c29960;
            background: #f9efdf;
            border: 1px solid #e7cfaa;
            padding: 2px 12px;
            border-radius: 30px;
            white-space: nowrap;
            font-family: monospace;
        }

        .log-running {
            color: #b47c48;
            font-style: italic;
        }
        .log-running::before {
            background: #e9bc7d !important;
            border-color: #e9bc7d !important;
            box-shadow: 0 0 5px #ebb05e, 0 0 0 2px #fef5e6 !important;
            animation: gentlePulse 1.6s infinite;
        }

        @keyframes gentlePulse {
            0% { opacity: 0.7; transform: scale(1);}
            50% { opacity: 1; transform: scale(1.15); background: #e9b056;}
            100% { opacity: 0.7; transform: scale(1);}
        }

        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 11px;
            color: #b9996b;
            border-top: 1px solid #e2cfab;
            padding-top: 16px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title-wrapper">
        <h1>📜 文渊阁 · 书卷导入</h1>
    </div>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📖</div>
        <div class="upload-text">点击或拖拽卷册至此  MD</div>
        <div class="upload-sub">支持 md 格式，自动入库编目</div>
        <input type="file" id="fileInput" class="file-input" accept=".pdf,.md" multiple>
    </div>

    <div id="fileList" class="file-list">
        <!-- 动态文件卡片 -->
    </div>
    <footer>⚡ 书卷入库后自动解析，可于听书知识库中查阅</footer>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');

    // 后端API地址（与原设计一致，保留8000端口）
    const API_BASE = 'http://127.0.0.1:8000';

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#b98f5a';
        dropZone.style.background = '#fdf6e6';
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '';
        dropZone.style.background = '';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '';
        dropZone.style.background = '';
        handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFiles(e.target.files);
        fileInput.value = ''; // 清空，便于重复上传同文件
    });

    function handleFiles(files) {
        Array.from(files).forEach(uploadFile);
    }

    function updateProgressUI(wrapper, percentage) {
        const bar = wrapper.querySelector('.progress-bar');
        const text = wrapper.querySelector('.progress-text');
        const safe = Math.min(Math.max(percentage, 0), 100);
        bar.style.width = safe + '%';
        text.textContent = Math.round(safe) + '%';
        if (safe >= 100) {
            bar.style.background = "linear-gradient(90deg, #9bba7a, #c2d18c)";
        } else {
            bar.style.background = "linear-gradient(90deg, #b88f5a, #dcb27a)";
        }
    }

    // 辅助：格式化耗时（古雅风格）
    function formatDuration(seconds) {
        if (seconds < 60) return seconds.toFixed(1) + '秒';
        const mins = Math.floor(seconds / 60);
        const secs = (seconds % 60).toFixed(0);
        return `${mins}分${secs}秒`;
    }

    // 渲染日志与进度（根据后端数据结构）
    function renderLogsAndProgress(itemEl, doneList, runningList, totalNodes, durations) {
        const logSummary = itemEl.querySelector('.log-details summary');
        const logListEl = itemEl.querySelector('.log-list');
        const done = Array.isArray(doneList) ? doneList : [];
        const running = Array.isArray(runningList) ? runningList : [];
        const durationMap = durations || {};

        let currentPercentage = (done.length / totalNodes) * 100;
        if (running.length > 0 && currentPercentage < 99) {
            currentPercentage += (0.6 / totalNodes) * 100;
        }
        currentPercentage = Math.min(currentPercentage, 98);

        // 总耗时（若有）
        let totalDuration = 0;
        for (const key in durationMap) {
            totalDuration += durationMap[key];
        }
        const totalDurText = totalDuration > 0 ? ` · 累计用时 ${formatDuration(totalDuration)}` : '';

        logSummary.textContent = `📋 雕版日志 (完成: ${done.length} / 共 ${totalNodes} 步${totalDurText})`;

        logListEl.innerHTML = '';

        // 渲染已完成节点（过滤掉 upload_file 隐藏节点，但展示也可）
        for (const step of done) {
            if (step === 'upload_file') continue;
            const li = document.createElement('li');
            li.className = 'log-done';
            const stepName = step.replace(/_/g, '·');
            li.innerHTML = `<span>✅ ${stepName}</span>`;
            const durSpan = document.createElement('span');
            durSpan.className = 'log-duration';
            durSpan.textContent = formatDuration(durationMap[step]);
            li.appendChild(durSpan);
            logListEl.appendChild(li);
        }

        for (const step of running) {
            const li = document.createElement('li');
            li.className = 'log-running';
            const stepName = step.replace(/_/g, '·');
            li.innerHTML = `<span>⏳ 正在处理 ${stepName} ...</span>`;
            logListEl.appendChild(li);
        }

        if (done.length === 0 && running.length === 0) {
            const placeholder = document.createElement('li');
            placeholder.textContent = '等待书童启程...';
            placeholder.style.color = '#b59160';
            logListEl.appendChild(placeholder);
        }

        logListEl.scrollTop = logListEl.scrollHeight;
        return currentPercentage;
    }

    // 轮询任务状态（根据动态 totalNodes）
    async function uploadFile(file) {
        const isPDF = file.name.toLowerCase().endsWith('.pdf');
        // PDF 需多一步 pdf_to_md ，MD则少一步（总步数依据后端实际: 上传+分块+向量化+...）
        // 依据原有设计：PDF总节点数9，MD总节点数8（包含上传与最后完成）
        const totalNodes = isPDF ? 7 : 6;   // 与后端工作流步数匹配（不含虚拟的上传显示节点）
        const fileId = 'file-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8);

        const html = `
            <div class="file-item" id="${fileId}">
                <div class="file-info">
                    <div class="file-header">
                        <span class="file-name">📄 ${escapeHtml(file.name)}</span>
                        <span class="file-size">${(file.size / 1024).toFixed(1)} KB</span>
                    </div>
                    <div class="progress-wrapper">
                        <div class="progress-bar-container">
                            <div class="progress-bar"></div>
                        </div>
                        <div class="progress-text">0%</div>
                    </div>
                    <details class="log-details" open>
                        <summary>⏳ 待入阁...</summary>
                        <ul class="log-list"><li>准备呈递卷宗</li></ul>
                    </details>
                </div>
                <div class="status-badge status-uploading">呈递中</div>
            </div>
        `;
        fileList.insertAdjacentHTML('afterbegin', html);
        const itemEl = document.getElementById(fileId);
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressWrapper = itemEl.querySelector('.progress-wrapper');
        const logListEl = itemEl.querySelector('.log-list');

        progressWrapper.style.display = 'block';
        const startPercent = (1 / (totalNodes + 0.5)) * 100;
        updateProgressUI(progressWrapper, Math.min(startPercent, 8));

        // 初始日志
        const initLog = document.createElement('li');
        initLog.textContent = "📤 呈递书卷至文渊阁...";
        initLog.className = "log-running";
        logListEl.appendChild(initLog);

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error(`上传失败: ${response.status}`);
            }

            const result = await response.json();
            const taskId = result.task_id;

            // 更新UI状态
            statusBadge.textContent = '整理中';
            statusBadge.className = 'status-badge status-processing';
            updateProgressUI(progressWrapper, startPercent);

            // 开始轮询，传入 totalNodes
            pollStatus(taskId, itemEl, totalNodes);

        } catch (error) {
            console.error(error);
            statusBadge.textContent = '入阁失败';
            statusBadge.className = 'status-badge status-error';
            updateProgressUI(progressWrapper, 0);
            const errLi = document.createElement('li');
            errLi.textContent = `❌ 卷宗损坏或网络中断: ${error.message}`;
            errLi.style.color = "#b15533";
            logListEl.appendChild(errLi);
        }
    }

    function pollStatus(taskId, itemEl, totalNodes) {
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressWrapper = itemEl.querySelector('.progress-wrapper');
        const logDetails = itemEl.querySelector('.log-details');
        let active = true;
        let pollTimer = null;

        const fetchStatus = async () => {
            if (!active) return;
            try {
                const res = await fetch(`${API_BASE}/status/${taskId}`);
                if (!res.ok) throw new Error('状态查询失败');

                const data = await res.json();
                if (!active) return;

                // 计算动态进度和渲染日志
                const newPercent = renderLogsAndProgress(
                    itemEl,
                    data.done_list || [],
                    data.running_list || [],
                    totalNodes,
                    data.durations || {}
                );

                if (data.status === 'completed') {
                    active = false;
                    if (pollTimer) clearInterval(pollTimer);
                    statusBadge.textContent = '入阁藏典';
                    statusBadge.className = 'status-badge status-completed';
                    updateProgressUI(progressWrapper, 100);
                    // 延迟折叠日志，美观
                    setTimeout(() => {
                        if (logDetails) logDetails.open = false;
                    }, 1800);
                }
                else if (data.status === 'failed') {
                    active = false;
                    if (pollTimer) clearInterval(pollTimer);
                    statusBadge.textContent = '修书失败';
                    statusBadge.className = 'status-badge status-error';
                    const logListEl = itemEl.querySelector('.log-list');
                    const failLi = document.createElement('li');
                    failLi.textContent = "❌ 工作流中断，书卷未能入库";
                    failLi.style.color = "#b15533";
                    logListEl.appendChild(failLi);
                }
                else if (data.status === 'processing') {
                    // 更新进度
                    let finalPercent = newPercent;
                    if (finalPercent > 99) finalPercent = 99;
                    updateProgressUI(progressWrapper, finalPercent);
                }
            } catch (err) {
                console.warn('轮询异常', err);
                if (active) {
                    const logListEl = itemEl.querySelector('.log-list');
                    if (logListEl && !itemEl.querySelector('.poll-error')) {
                        const warnLi = document.createElement('li');
                        warnLi.className = 'poll-error';
                        warnLi.textContent = "⚠️ 与文渊阁通信波动，仍在努力...";
                        warnLi.style.color = "#c9884b";
                        logListEl.appendChild(warnLi);
                    }
                }
            }
        };

        // 立即执行一次
        fetchStatus();
        pollTimer = setInterval(fetchStatus, 1500);
        // 保存timer以便清理（非必须但规范）
        itemEl._pollTimer = pollTimer;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
</script>
</body>
</html>
